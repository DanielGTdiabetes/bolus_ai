services:
  - type: web
    name: bolus-ai
    env: python
    region: frankfurt
    plan: starter
    autoDeploy: false
    buildCommand: chmod +x build_render.sh && ./build_render.sh
    startCommand: ./render_start.sh
    healthCheckPath: /healthz
    envVars:
      - key: JWT_SECRET
        sync: false
      - key: NIGHTSCOUT_URL
        sync: false
      - key: NIGHTSCOUT_API_SECRET
        sync: false
      - key: APP_INSTANCE_ROLE
        value: backup
      - key: APP_INSTANCE_LOCATION
        value: render
      - key: DATA_DIR
        value: /var/data
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 20.10.0
    disk:
      name: bolus-data
      mountPath: /var/data
      sizeGB: 1
